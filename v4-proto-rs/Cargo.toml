[package]
name = "v4-proto-rs"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0"

[lib]
doctest = false

[features]
default = ["grpc-transport"]
grpc-transport = ["tonic/transport"]

[dependencies]
cosmos-sdk-proto = { version = "0.25.0", default-features = false, features = ["grpc"] }
prost = { version = "0.13", default-features = false }
prost-types = "0.13"
tonic = { version = "0.12", default-features = false, features = ["codegen", "prost"] }

[build-dependencies]
regex = "1.11.0"
tonic-buf-build = { git = "https://github.com/v0-e/tonic-buf-build", rev = "eaa38fb83bd696cf6d91494ff1f92445b461b009" }
prost-build = "0.13" # keep the version the same as in tonic-buf-build
tonic-build = "0.12" # keep the version the same as in tonic-buf-build
