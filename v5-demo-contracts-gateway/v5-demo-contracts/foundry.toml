[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 1000 }

[rpc_endpoints]
base_sepolia = "${RPC_URL}"
anvil = "http://localhost:8545"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}" }

